<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 696" role="img" aria-labelledby="title desc">
  <title id="title">Racion logo hero</title>
  <desc id="desc">Wide dark hero image with the Racion app logo centered.</desc>
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#30363d"/>
      <stop offset="0.5" stop-color="#20272d"/>
      <stop offset="1" stop-color="#171d23"/>
    </linearGradient>
    <radialGradient id="heroGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1030 346) rotate(90) scale(350 520)">
      <stop offset="0" stop-color="#7f95aa" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#7f95aa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="capsulePrimary" x1="8" y1="8" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#89A8C8"/>
      <stop offset="1" stop-color="#BFD0E2"/>
    </linearGradient>
    <linearGradient id="capsuleSecondary" x1="56" y1="52" x2="92" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9AB4CF"/>
      <stop offset="1" stop-color="#C8D7E8"/>
    </linearGradient>
    <linearGradient id="orb" x1="54" y1="18" x2="78" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C5D4E5"/>
      <stop offset="1" stop-color="#91ABC5"/>
    </linearGradient>
    <radialGradient id="surface" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(48 48) rotate(90) scale(58)">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F2F6FB"/>
    </radialGradient>
    <filter id="logoShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#0b1117" flood-opacity="0.5"/>
    </filter>
    <clipPath id="outerClip">
      <rect x="12" y="15" width="2024" height="666" rx="47"/>
    </clipPath>
  </defs>

  <rect width="2048" height="696" fill="#12181e"/>
  <g clip-path="url(#outerClip)">
    <rect x="12" y="15" width="2024" height="666" rx="47" fill="url(#heroBg)"/>
    <rect x="12" y="15" width="2024" height="666" rx="47" fill="url(#heroGlow)"/>
    <path d="M270 572 1520 15" stroke="#6b747e" stroke-width="2" opacity="0.28"/>
    <path d="M1210 306 1905 -30" stroke="#8b949e" stroke-width="2.4" opacity="0.42"/>
    <path d="M-90 120 320 -24" stroke="#68727c" stroke-width="1.6" opacity="0.12"/>
  </g>
  <rect x="12" y="15" width="2024" height="666" rx="47" fill="none" stroke="#707982" stroke-width="2.2" opacity="0.6"/>
  <rect x="15" y="18" width="2018" height="660" rx="44" fill="none" stroke="#111820" stroke-width="2" opacity="0.7"/>

  <g transform="translate(764 88) scale(5.4166667)" filter="url(#logoShadow)">
    <rect width="96" height="96" rx="26" fill="url(#surface)"/>
    <rect x="2" y="2" width="92" height="92" rx="24" stroke="#D9E4EF" stroke-width="2"/>

    <g opacity="0.96">
      <rect
        x="-8"
        y="15"
        width="46"
        height="20"
        rx="10"
        transform="rotate(-34 -8 15)"
        fill="url(#capsulePrimary)"
      />
      <rect
        x="58"
        y="64"
        width="46"
        height="20"
        rx="10"
        transform="rotate(-34 58 64)"
        fill="url(#capsuleSecondary)"
      />
      <circle cx="71" cy="28" r="11" fill="url(#orb)"/>
      <circle cx="33" cy="66" r="12" fill="#F8FBFE" stroke="#E1EAF3" stroke-width="1.5"/>
      <path
        d="M-2 39C9.4 31.3 18.9 24.8 28.8 18.4C35.4 14.1 41 13.7 47.2 18.4"
        stroke="white"
        stroke-width="2.4"
        stroke-linecap="round"
        opacity="0.88"
      />
      <path
        d="M61.8 15.8C68.6 22.5 73.5 27.4 78.7 33.2C82.2 37 86.4 38.1 92.4 35.7"
        stroke="white"
        stroke-width="2.3"
        stroke-linecap="round"
        opacity="0.82"
      />
    </g>
  </g>
</svg>
