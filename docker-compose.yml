name: food-diary-app

x-app-environment: &app-environment
  APP_ENV: development
  RELEASE_VERSION: compose-local
  SERVER_HOST: 0.0.0.0
  SERVER_PORT: 8080
  JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
  DB_PROVIDER: postgres
  DB_HOST: postgres
  DB_PORT: 5432
  DB_NAME: ${DB_NAME:-nutritrack}
  DB_USER: ${DB_USER:-nutritrack}
  DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
  REDIS_URL: redis://redis:6379

services:
  app:
    build:
      context: .
      dockerfile: ./Dockerfile
    restart: unless-stopped
    environment: *app-environment
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started

  migrate:
    build:
      context: .
      dockerfile: ./Dockerfile
    restart: "no"
    command: ["node", "server/src/cli.js", "migrate"]
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy

  seed-demo:
    build:
      context: .
      dockerfile: ./Dockerfile
    profiles: ["demo"]
    restart: "no"
    command: ["node", "server/src/cli.js", "seed-demo"]
    environment:
      <<: *app-environment
      DEMO_USER_PASSWORD: ${DEMO_USER_PASSWORD:-}
      ADMIN_USER_PASSWORD: ${ADMIN_USER_PASSWORD:-}
    depends_on:
      migrate:
        condition: service_completed_successfully

  seed-large:
    build:
      context: .
      dockerfile: ./Dockerfile
    profiles: ["large-demo"]
    restart: "no"
    command: ["node", "server/src/cli.js", "seed-large"]
    environment:
      <<: *app-environment
      DEMO_USER_PASSWORD: ${DEMO_USER_PASSWORD:-}
      ADMIN_USER_PASSWORD: ${ADMIN_USER_PASSWORD:-}
    depends_on:
      migrate:
        condition: service_completed_successfully

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-nutritrack}
      POSTGRES_USER: ${DB_USER:-nutritrack}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nutritrack} -d ${DB_NAME:-nutritrack}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6379}:6379"

volumes:
  postgres-data:
